# This workflow publishes a benchmarks comment on a pull request. It is
# triggered after the unprivileged PR benchmark workflow completes, keeping
# write permissions out of the pull_request workflow.
name: Publish benchmarks comment to PR

on:
  workflow_run:
    workflows: ["Run benchmarks for PR"]
    types: [completed]

jobs:
  upload-pr-comment:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      issues: write
      pull-requests: write

    steps:
      - name: Display workflow run information
        run: |
          echo "Workflow Run ID: ${{ github.event.workflow_run.id }}"
          echo "Head SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Head Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Event: ${{ github.event.workflow_run.event }}"

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-artifacts
          path: benchmark-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Extract PR information
        id: pr-info
        run: |
          pr_number="$(cat benchmark-artifacts/pr)"
          printf "PR number: %s\n" "${pr_number}"
          printf "Benchmark comment:\n"
          cat benchmark-artifacts/output
          printf "pr=%s\n" "${pr_number}" >> "${GITHUB_OUTPUT}"

      - name: Find benchmarks comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ steps.pr-info.outputs.pr }}
          comment-author: "github-actions[bot]"
          body-includes: "jaxqsofit PR benchmark"

      - name: Create or update benchmarks comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ steps.pr-info.outputs.pr }}
          body-path: benchmark-artifacts/output
          edit-mode: replace
