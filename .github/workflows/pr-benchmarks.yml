name: Run benchmarks for PR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdss-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          path: benchmark-head
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Checkout base
        uses: actions/checkout@v4
        with:
          path: benchmark-base
          ref: ${{ github.event.pull_request.base.sha || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and benchmark deps
        run: |
          python -m pip install --upgrade pip
          pip install "jax==0.4.31" "jaxlib==0.4.31" "numpyro==0.19.0"
          pip install -e benchmark-head
          pip install astroquery

      - name: Restore DSPS SSP template cache
        id: cache-dsps-ssp
        uses: actions/cache@v4
        with:
          path: tempdata.h5
          key: dsps-ssp-fsps-v3.2-lgmet-age-v1

      - name: Download DSPS SSP template on cache miss
        if: steps.cache-dsps-ssp.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 --retry-delay 2 --connect-timeout 20 --max-time 300 \
            https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/ssp_data_fsps_v3.2_lgmet_age.h5 \
            --output tempdata.h5
          test -s tempdata.h5

      - name: Run SDSS benchmark
        env:
          JAXQSOFIT_BENCH_OPTAX_STEPS: "200"
          JAXQSOFIT_BENCH_OPTAX_LR: "1e-2"
          JAXQSOFIT_BENCH_REPEATS: "3"
        run: |
          mkdir -p benchmark-artifacts
          python -m pip install --force-reinstall --no-deps -e benchmark-base
          python benchmark-head/benchmarks/sdss_pr_benchmark.py run \
            --output-dir benchmark-artifacts/base \
            --label base \
            --sha "${{ github.event.pull_request.base.sha || 'main' }}" \
            --dsps-ssp-fn tempdata.h5

          python -m pip install --force-reinstall --no-deps -e benchmark-head
          python benchmark-head/benchmarks/sdss_pr_benchmark.py run \
            --output-dir benchmark-artifacts/head \
            --label pr \
            --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            --dsps-ssp-fn tempdata.h5

          python benchmark-head/benchmarks/sdss_pr_benchmark.py compare \
            --baseline-json benchmark-artifacts/base/benchmark.json \
            --candidate-json benchmark-artifacts/head/benchmark.json \
            --output-dir benchmark-artifacts

      - name: Store PR number
        if: github.event_name == 'pull_request'
        run: |
          printf "%s" "${{ github.event.pull_request.number }}" > benchmark-artifacts/pr

      - name: Store manual run marker
        if: github.event_name != 'pull_request'
        run: |
          printf "%s" "0" > benchmark-artifacts/pr

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: benchmark-artifacts/
